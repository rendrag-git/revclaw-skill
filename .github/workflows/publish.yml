name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'config.json'
      - 'README.md'
      - 'references/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract version from SKILL.md
        id: version
        run: |
          VERSION=$(grep -oP 'version:\s*\K[\d.]+' SKILL.md || echo "")
          if [ -z "$VERSION" ]; then
            VERSION="1.2.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Extract changelog from commit
        id: changelog
        run: |
          MSG=$(git log -1 --pretty=%B | head -5)
          echo "msg<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MSG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          python3 -c "
          import json, requests, glob, os

          token = os.environ['CLAWHUB_TOKEN']
          version = '${{ steps.version.outputs.version }}'
          changelog = '''${{ steps.changelog.outputs.msg }}'''

          payload = json.dumps({
              'slug': 'revclaw',
              'displayName': 'Agent Reviews',
              'version': version,
              'changelog': changelog,
              'tags': ['latest'],
              'acceptLicenseTerms': True
          })

          # Collect all skill files
          skill_files = []
          for pattern in ['SKILL.md', 'config.json', 'README.md', 'references/*']:
              for path in glob.glob(pattern):
                  if os.path.isfile(path):
                      skill_files.append(('files', (path, open(path, 'rb'), 'text/plain')))

          resp = requests.post('https://clawhub.ai/api/v1/skills',
              headers={'Authorization': 'Bearer ' + token},
              data={'payload': payload},
              files=skill_files
          )

          print(f'Status: {resp.status_code}')
          print(resp.text)

          if resp.status_code != 200:
              raise SystemExit(f'Publish failed: {resp.status_code} {resp.text}')
          "
